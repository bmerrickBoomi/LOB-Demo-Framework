<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HR Operations Console</title>
<style>
:root {
  --primary: #2563eb; --primary-dark: #1d4ed8; --primary-light: #dbeafe;
  --success: #16a34a; --success-light: #dcfce7;
  --warning: #d97706; --warning-light: #fef3c7;
  --danger: #dc2626; --danger-light: #fee2e2;
  --purple: #7c3aed; --purple-light: #ede9fe;
  --bg: #f1f5f9; --surface: #ffffff; --surface2: #f8fafc;
  --border: #e2e8f0; --border2: #cbd5e1;
  --text: #0f172a; --text2: #475569; --text3: #94a3b8;
  --sidebar-w: 220px; --header-h: 56px; --ai-w: 320px;
  --radius: 8px; --radius-sm: 4px;
  --shadow: 0 1px 3px rgba(0,0,0,.1), 0 1px 2px rgba(0,0,0,.06);
  --shadow-md: 0 4px 6px rgba(0,0,0,.07), 0 2px 4px rgba(0,0,0,.06);
  --shadow-lg: 0 10px 15px rgba(0,0,0,.1), 0 4px 6px rgba(0,0,0,.05);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Inter',system-ui,-apple-system,sans-serif;font-size:14px;color:var(--text);background:var(--bg)}
a{color:inherit;text-decoration:none}
button{cursor:pointer;font-family:inherit;font-size:inherit}
input,textarea,select{font-family:inherit;font-size:inherit}
/* Layout */
#app{display:grid;grid-template-columns:var(--sidebar-w) 1fr var(--ai-w);grid-template-rows:var(--header-h) 1fr;height:100vh;overflow:hidden}
#header{grid-column:1/-1;grid-row:1;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:12px;z-index:100;box-shadow:var(--shadow)}
#sidebar{grid-column:1;grid-row:2;background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;display:flex;flex-direction:column}
#main{grid-column:2;grid-row:2;overflow-y:auto;padding:24px}
#ai-panel{grid-column:3;grid-row:2;background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
/* Header */
.header-logo{font-size:16px;font-weight:700;color:var(--primary);white-space:nowrap;margin-right:8px}
.header-logo span{color:var(--text3);font-weight:400;font-size:12px;margin-left:4px}
.search-wrap{flex:1;max-width:360px;position:relative}
.search-wrap input{width:100%;padding:7px 12px 7px 36px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface2);color:var(--text);outline:none;transition:.2s}
.search-wrap input:focus{border-color:var(--primary);background:#fff}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none}
.search-results{position:absolute;top:calc(100% + 4px);left:0;right:0;background:#fff;border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow-lg);z-index:200;max-height:280px;overflow-y:auto;display:none}
.search-results.show{display:block}
.search-item{padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--border);transition:.15s}
.search-item:hover{background:var(--surface2)}
.search-item:last-child{border-bottom:none}
.search-item .emp-name{font-weight:600;font-size:13px}
.search-item .emp-meta{font-size:11px;color:var(--text3);margin-top:1px}
.header-actions{display:flex;align-items:center;gap:8px;margin-left:auto}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--radius);border:none;font-weight:500;transition:.2s;line-height:1}
.btn-primary{background:var(--primary);color:#fff}.btn-primary:hover{background:var(--primary-dark)}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border)}.btn-secondary:hover{background:var(--border)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-danger{background:var(--danger);color:#fff}.btn-danger:hover{opacity:.9}
.btn-success{background:var(--success);color:#fff}.btn-success:hover{opacity:.9}
.icon-btn{background:none;border:none;padding:6px;border-radius:var(--radius-sm);color:var(--text2);position:relative;display:flex;align-items:center;justify-content:center}.icon-btn:hover{background:var(--surface2)}
.notif-badge{position:absolute;top:2px;right:2px;background:var(--danger);color:#fff;border-radius:50%;width:14px;height:14px;font-size:9px;display:flex;align-items:center;justify-content:center;font-weight:700}
.notif-dropdown{position:absolute;top:calc(100% + 8px);right:0;width:320px;background:#fff;border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow-lg);z-index:200;display:none}
.notif-dropdown.show{display:block}
.notif-header{padding:12px 16px;border-bottom:1px solid var(--border);font-weight:600;font-size:13px;display:flex;justify-content:space-between;align-items:center}
.notif-item{padding:10px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:.15s}
.notif-item:hover{background:var(--surface2)}
.notif-item:last-child{border-bottom:none}
.notif-title{font-weight:500;font-size:12px;margin-bottom:2px}
.notif-time{font-size:11px;color:var(--text3)}
/* Sidebar Nav */
.nav-section{padding:8px 0}
.nav-label{padding:6px 16px 4px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text3)}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 16px;color:var(--text2);cursor:pointer;transition:.15s;border-radius:0;font-size:13px;font-weight:500}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:var(--primary-light);color:var(--primary);font-weight:600}
.nav-item svg{flex-shrink:0;opacity:.7}
.nav-item.active svg{opacity:1}
.nav-badge{margin-left:auto;background:var(--danger);color:#fff;border-radius:10px;padding:1px 6px;font-size:10px;font-weight:700}
.nav-footer{margin-top:auto;padding:12px;border-top:1px solid var(--border)}
.user-chip{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--radius);background:var(--surface2)}
.avatar{width:30px;height:30px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;flex-shrink:0}
.avatar-lg{width:48px;height:48px;font-size:18px}
.user-info{flex:1;min-width:0}
.user-name{font-weight:600;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.user-role{font-size:10px;color:var(--text3)}
/* Cards & KPIs */
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.page-title{font-size:20px;font-weight:700}
.page-subtitle{font-size:12px;color:var(--text3);margin-top:2px}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px;margin-bottom:20px}
.kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow)}
.kpi-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:8px}
.kpi-value{font-size:28px;font-weight:800;line-height:1}
.kpi-sub{font-size:11px;color:var(--text3);margin-top:4px}
.kpi-trend{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:600;padding:2px 6px;border-radius:10px;margin-top:6px}
.trend-up{background:var(--danger-light);color:var(--danger)}
.trend-down{background:var(--success-light);color:var(--success)}
.kpi-danger .kpi-value{color:var(--danger)}
.kpi-warning .kpi-value{color:var(--warning)}
.kpi-success .kpi-value{color:var(--success)}
.kpi-primary .kpi-value{color:var(--primary)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow)}
.card-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:14px;font-weight:600}
.card-body{padding:16px}
/* Badges & Severity */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;white-space:nowrap}
.badge-danger{background:var(--danger-light);color:var(--danger)}
.badge-warning{background:var(--warning-light);color:var(--warning)}
.badge-success{background:var(--success-light);color:var(--success)}
.badge-primary{background:var(--primary-light);color:var(--primary)}
.badge-neutral{background:var(--surface2);color:var(--text2);border:1px solid var(--border)}
.badge-purple{background:var(--purple-light);color:var(--purple)}
.sev{display:inline-block;width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sev-critical{background:var(--danger)}
.sev-high{background:var(--warning)}
.sev-medium{background:#3b82f6}
.sev-low{background:var(--text3)}
/* Tables */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{padding:10px 12px;text-align:left;font-weight:600;color:var(--text2);border-bottom:2px solid var(--border);background:var(--surface2);white-space:nowrap}
td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:hover td{background:var(--surface2)}
tr:last-child td{border-bottom:none}
.link{color:var(--primary);cursor:pointer;font-weight:500}.link:hover{text-decoration:underline}
/* Filters */
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;align-items:center}
.filter-bar select,.filter-bar input{padding:6px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);background:#fff;color:var(--text);outline:none;font-size:12px}
.filter-bar select:focus,.filter-bar input:focus{border-color:var(--primary)}
/* Employee 360 */
.emp-360-header{display:flex;align-items:flex-start;gap:16px;padding:20px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:16px}
.emp-meta-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-top:12px}
.emp-meta-item .label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:2px}
.emp-meta-item .value{font-size:13px;font-weight:500}
.tabs{display:flex;gap:0;border-bottom:2px solid var(--border);margin-bottom:16px;overflow-x:auto}
.tab{padding:9px 16px;cursor:pointer;color:var(--text2);font-weight:500;font-size:13px;border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap;transition:.15s}
.tab:hover{color:var(--text)}
.tab.active{color:var(--primary);border-bottom-color:var(--primary);font-weight:600}
.conf-indicator{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:2px 7px;border-radius:10px}
.conf-match{background:#dcfce7;color:#16a34a}
.conf-mismatch{background:#fee2e2;color:#dc2626}
.conf-unknown{background:#f1f5f9;color:#64748b}
/* Cases */
.case-timeline{display:flex;flex-direction:column;gap:0}
.timeline-item{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.timeline-item:last-child{border-bottom:none}
.timeline-dot{width:10px;height:10px;border-radius:50%;background:var(--primary);flex-shrink:0;margin-top:4px}
.timeline-dot.system{background:var(--text3)}
.timeline-dot.alert{background:var(--danger)}
/* Progress */
.progress-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;background:var(--primary);transition:.3s}
/* Integration Cards */
.int-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px}
.int-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;cursor:pointer;transition:.2s;box-shadow:var(--shadow)}
.int-card:hover{box-shadow:var(--shadow-md);border-color:var(--border2)}
.int-card.selected{border-color:var(--primary);box-shadow:0 0 0 2px var(--primary-light)}
.int-status{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600}
.status-dot{width:8px;height:8px;border-radius:50%}
.status-ok{background:var(--success)}.status-warn{background:var(--warning)}.status-error{background:var(--danger)}
/* Time Saved Widget */
.ts-widget{background:linear-gradient(135deg,#2563eb 0%,#7c3aed 100%);color:#fff;border-radius:var(--radius);padding:20px;margin-bottom:20px}
.ts-title{font-size:14px;font-weight:700;opacity:.9;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.ts-controls{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:16px}
.ts-control label{display:block;font-size:11px;opacity:.8;margin-bottom:4px;font-weight:600}
.ts-control input[type=range]{width:160px;accent-color:#fff}
.ts-control .val{font-size:13px;font-weight:700}
.ts-results{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.ts-result{background:rgba(255,255,255,.15);border-radius:var(--radius-sm);padding:12px;text-align:center}
.ts-result .num{font-size:24px;font-weight:800;line-height:1}
.ts-result .lbl{font-size:10px;opacity:.8;margin-top:3px}
/* Priority Queue */
.pq-item{display:flex;align-items:flex-start;gap:10px;padding:12px 0;border-bottom:1px solid var(--border);cursor:pointer}
.pq-item:last-child{border-bottom:none}
.pq-item:hover{background:var(--surface2);margin:0 -16px;padding:12px 16px}
.pq-content{flex:1;min-width:0}
.pq-title{font-weight:500;font-size:13px;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pq-meta{font-size:11px;color:var(--text3)}
.pq-due{font-size:11px;color:var(--danger);font-weight:600}
/* Modals */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow-lg);max-width:560px;width:100%;max-height:90vh;overflow-y:auto;animation:modalIn .18s ease}
@keyframes modalIn{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
.modal-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:16px;font-weight:700}
.modal-body{padding:20px}
.modal-footer{padding:14px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:5px}
.form-control{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);outline:none;transition:.2s;background:#fff}
.form-control:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-light)}
select.form-control{cursor:pointer}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
/* AI Panel */
.ai-header{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.ai-title{font-size:13px;font-weight:700;display:flex;align-items:center;gap:6px}
.ai-dot{width:7px;height:7px;border-radius:50%;background:var(--success);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes ai-bounce{0%,80%,100%{transform:scale(0)}40%{transform:scale(1)}}
.ai-typing{display:flex;gap:4px;align-items:center;padding:2px 0}
.ai-typing span{width:6px;height:6px;border-radius:50%;background:var(--text3);display:inline-block;animation:ai-bounce 1.2s infinite ease-in-out}
.ai-typing span:nth-child(1){animation-delay:-0.24s}.ai-typing span:nth-child(2){animation-delay:-0.12s}.ai-typing span:nth-child(3){animation-delay:0s}
.ai-api-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;padding:2px 7px;border-radius:10px;margin-top:6px;font-weight:600;letter-spacing:.02em}
.ai-api-badge.ok{background:var(--success-light);color:var(--success)}.ai-api-badge.err{background:#f1f5f9;color:var(--text3);border:1px solid var(--border)}
.ai-messages{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px}
.ai-msg{max-width:90%;padding:9px 12px;border-radius:var(--radius);font-size:12px;line-height:1.5}
.ai-msg.user{background:var(--primary);color:#fff;align-self:flex-end;border-bottom-right-radius:2px}
.ai-msg.assistant{background:var(--surface2);color:var(--text);align-self:flex-start;border-bottom-left-radius:2px;border:1px solid var(--border)}
.ai-msg.system{background:var(--warning-light);color:var(--warning);align-self:center;font-size:11px;text-align:center;font-style:italic;border-radius:10px}
.ai-suggestions{padding:8px 12px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:5px;flex-shrink:0}
.ai-sugg-label{font-size:10px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px}
.ai-sugg-btn{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:6px 10px;text-align:left;font-size:11px;color:var(--text2);cursor:pointer;transition:.15s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ai-sugg-btn:hover{background:var(--primary-light);border-color:var(--primary);color:var(--primary)}
.ai-composer{padding:10px 12px;border-top:1px solid var(--border);flex-shrink:0}
.ai-composer textarea{width:100%;resize:none;border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 10px;font-size:12px;line-height:1.4;outline:none;min-height:64px;max-height:120px;background:var(--surface2)}
.ai-composer textarea:focus{border-color:var(--primary);background:#fff}
.ai-composer-actions{display:flex;align-items:center;justify-content:space-between;margin-top:6px}
.ai-toggle{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text3)}
.toggle{position:relative;display:inline-block;width:28px;height:15px}
.toggle input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;cursor:pointer;inset:0;background:var(--border2);border-radius:15px;transition:.2s}
.toggle input:checked + .toggle-slider{background:var(--primary)}
.toggle-slider:before{position:absolute;content:"";height:11px;width:11px;left:2px;top:2px;background:#fff;border-radius:50%;transition:.2s}
.toggle input:checked + .toggle-slider:before{left:15px}
/* Skeleton */
.skeleton{background:linear-gradient(90deg,var(--border) 25%,var(--surface2) 50%,var(--border) 75%);background-size:200% 100%;animation:shimmer 1.2s infinite;border-radius:var(--radius-sm)}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
/* Misc */
.empty{text-align:center;padding:40px 20px;color:var(--text3)}
.empty-icon{font-size:36px;margin-bottom:8px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.flex{display:flex}.flex-col{flex-direction:column}.items-center{align-items:center}.justify-between{justify-content:space-between}.gap-2{gap:8px}.gap-3{gap:12px}.gap-4{gap:16px}
.mt-1{margin-top:4px}.mt-2{margin-top:8px}.mt-3{margin-top:12px}.mt-4{margin-top:16px}
.mb-2{margin-bottom:8px}.mb-3{margin-bottom:12px}.mb-4{margin-bottom:16px}
.p-2{padding:8px}.p-3{padding:12px}.p-4{padding:16px}
.text-sm{font-size:12px}.text-xs{font-size:11px}.text-lg{font-size:16px}.text-xl{font-size:20px}
.fw-600{font-weight:600}.fw-700{font-weight:700}
.text-muted{color:var(--text3)}.text-danger{color:var(--danger)}.text-success{color:var(--success)}.text-warning{color:var(--warning)}.text-primary{color:var(--primary)}
.rounded{border-radius:var(--radius)}.border{border:1px solid var(--border)}
.w-full{width:100%}
.tag{display:inline-flex;align-items:center;padding:2px 7px;border-radius:4px;font-size:11px;background:var(--surface2);border:1px solid var(--border);color:var(--text2);margin:1px}
.divider{height:1px;background:var(--border);margin:12px 0}
@media(max-width:1100px){:root{--ai-w:260px;--sidebar-w:190px}}
@media(max-width:820px){
  #app{grid-template-columns:0 1fr 0;grid-template-rows:var(--header-h) 1fr}
  #sidebar{position:fixed;left:-100%;top:var(--header-h);height:calc(100vh - var(--header-h));width:220px;z-index:90;transition:.3s;border-right:1px solid var(--border)}
  #sidebar.open{left:0}
  #ai-panel{position:fixed;right:-100%;top:var(--header-h);height:calc(100vh - var(--header-h));width:300px;z-index:90;transition:.3s}
  #ai-panel.open{right:0}
  #main{grid-column:1/-1}
}
.error-detail-panel{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-top:12px}
.recon-row{display:grid;grid-template-columns:1fr 1fr auto;gap:10px;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)}
.recon-row:last-child{border-bottom:none}
.recon-label{font-size:11px;color:var(--text3);margin-bottom:2px;font-weight:600;text-transform:uppercase}
.recon-val{font-size:13px;font-weight:500;padding:4px 8px;border-radius:4px}
.val-keep{background:var(--success-light);color:var(--success)}
.val-discard{background:var(--danger-light);color:var(--danger);text-decoration:line-through;opacity:.6}
.val-conflict{background:var(--warning-light);color:var(--warning)}
</style>

function navigate(route, opts={}) {
  currentRoute = route;
  window.location.hash = route;
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.route === route || (route.startsWith(el.dataset.route+'/') && el.dataset.route !== '/'));
  });
  renderMain();
  updateAISuggestions();
  if (!opts.noScroll) document.getElementById('main').scrollTop = 0;
}

function renderMain() {
  const main = document.getElementById('main');
  if (currentRoute === '/dashboard') renderDashboard(main);
  else if (currentRoute.startsWith('/employees')) renderEmployees(main);
  else if (currentRoute.startsWith('/cases')) renderCases(main);
  else if (currentRoute === '/compliance') renderCompliance(main);
  else if (currentRoute === '/integrations') renderIntegrations(main);
  else if (currentRoute === '/reports') renderReports(main);
  else if (currentRoute === '/settings') renderSettings(main);
  else renderDashboard(main);
}

function updateTS(rate, hours) {

  const hSaved=Math.round(bh*0.4), wSave=Math.round(hSaved*hr), ySave=wSave*52;
  document.getElementById('ts-hrs').textContent=hSaved;
  document.getElementById('ts-wk').textContent=fmtCur(wSave);
  document.getElementById('ts-yr').textContent=fmtCur(ySave);
  if(STATE.settings.persistence) saveToStorage();
}

function buildPriorityQueue() {
  const q=[];
  STATE.cases.filter(c=>c.status!=='Closed'&&c.severity==='Critical').forEach(c=>{
    q.push({title:c.title,cat:'Case · '+c.type,sev:'Critical',due:fmtDate(c.sla),action:`navigate('/cases')` });
  });
  STATE.tasks.filter(t=>!t.done&&isOverdue(t.due)).forEach(t=>{
    q.push({title:t.title,cat:'Task · '+t.case,sev:'High',due:fmtDate(t.due),action:`navigate('/cases')`});
  });
  STATE.compliance.filter(c=>c.daysPast>20).forEach(c=>{
    q.push({title:c.title+' — '+c.employeeName,cat:'Compliance · '+c.type,sev:c.daysPast>30?'Critical':'High',due:fmtDate(c.dueDate),action:`navigate('/compliance')`});
  });
  STATE.integrations.filter(i=>i.errors>0).forEach(i=>{
    i.errors_list.filter(e=>e.severity==='critical').forEach(e=>{
      q.push({title:i.name+': '+e.msg.substring(0,60),cat:'Integration Error',sev:'Critical',due:'',action:`selectIntegration('${i.id}')`});
    });
  });
  return q.slice(0,10);
}

  const sevFilter = el._caseSev||'';
  let cases = STATE.cases.filter(c=>{
    if(statusFilter && c.status!==statusFilter) return false;
    if(sevFilter && c.severity!==sevFilter) return false;
    return true;
  });

  el.innerHTML = `
<div class="page-header"><div><div class="page-title">Case Management</div><div class="page-subtitle">${STATE.cases.filter(c=>c.status!=='Closed').length} open cases</div></div>

  <select onchange="caseFilter(this.value,'sev')"><option value="">All Severities</option>${['Critical','High','Medium','Low'].map(s=>`<option value="${s}" ${sevFilter===s?'selected':''}>${s}</option>`).join('')}</select>

  <td><span class="link fw-600" onclick="openCase('${c.id}')">${esc(c.id)}</span></td>

function caseFilter(val,type) {
  const main=document.getElementById('main');
  if(type==='status')main._caseStatus=val;
  else if(type==='sev')main._caseSev=val;
  renderCases(main);
}

function openCase(id) {
  selectedCase=STATE.cases.find(c=>c.id===id);
  navigate('/cases/'+id,{noScroll:true});
}

function toggleTask(caseId,taskId,done) {
  const c=STATE.cases.find(c=>c.id===caseId);
  if(!c)return;
  const t=c.tasks.find(t=>t.id===taskId);
  if(t){t.done=done;addAudit('Sarah Reynolds','Task '+(done?'Completed':'Reopened'),caseId,t.title);}
  if(STATE.settings.persistence)saveToStorage();
}

function closeCase(id) {
  const c=STATE.cases.find(c=>c.id===id);
  if(!c)return;
  const outcome=prompt('Enter case outcome/resolution:');
  if(outcome===null)return;
  c.status='Closed';c.outcome=outcome;c.updated=new Date().toISOString().split('T')[0];
  c.timeline.push({date:new Date().toISOString().split('T')[0],actor:'Sarah Reynolds',type:'action',text:'Case closed. Outcome: '+outcome});
  addAudit('Sarah Reynolds','Case Closed',id,'Outcome: '+outcome);
  updateBadges();
  if(STATE.settings.persistence)saveToStorage();
  renderCaseDetail(document.getElementById('main'));
}

function renderIntDetail(id) {
  const intg=STATE.integrations.find(i=>i.id===id);

    <td class="text-xs fw-600">${esc(e.id)}</td>

function selectError(intId,errId) {
  selectedError=errId;
  document.getElementById('int-detail').innerHTML=renderIntDetail(intId);
}

function renderErrorDetail(intId,errId) {
  const intg=STATE.integrations.find(i=>i.id===intId);
  const err=intg?.errors_list.find(e=>e.id===errId);
  if(!err)return'';
  return`<div class="error-detail-panel">
    <div class="flex justify-between items-center mb-3"><span class="fw-700">${esc(err.id)} — ${esc(err.type)}</span>${sevBadge(err.severity.charAt(0).toUpperCase()+err.severity.slice(1))}</div>
    <div class="mb-3"><div class="text-xs fw-600 text-muted mb-1">RAW ERROR MESSAGE</div><code style="font-size:12px;background:#f1f5f9;padding:8px 12px;border-radius:4px;display:block;word-break:break-all">${esc(err.msg)}</code></div>
    <div class="mb-3"><div class="text-xs fw-600 text-muted mb-1">AFFECTED FIELD</div><span class="tag">${esc(err.field)}</span></div>
    <div class="mb-3"><div class="text-xs fw-600 text-muted mb-1">IMPACTED EMPLOYEES</div>${err.employees.map(eid=>`<span class="link text-sm" onclick="openEmployee('${eid}')">${empName(eid)}</span>`).join(', ')}</div>
    <div class="mb-3"><div class="text-xs fw-600 text-muted mb-1">SUGGESTED RESOLUTION</div><p class="text-sm" style="line-height:1.6;padding:8px 12px;background:var(--success-light);border-radius:4px;color:var(--success)">${esc(err.resolution)}</p></div>
    ${err.employees.length===1&&err.field==='Salary'?renderReconPanel(intg,err):''}
    <div class="flex gap-2 mt-3">
      <button class="btn btn-primary btn-sm" onclick="createReconTask('${intId}','${errId}')">Create Reconciliation Task</button>
      <button class="btn btn-secondary btn-sm" onclick="openEmployee('${err.employees[0]}')">View Employee</button>
    </div>
  </div>`;
}

function renderReconPanel(intg,err) {
  const emp=STATE.employees.find(e=>err.employees.includes(e.id));
  if(!emp)return'';
  const hrisVal=fmtCur(emp.systems.hris.salary), payVal=fmtCur(emp.systems.payroll?.salary||0);
  return`<div class="mb-3"><div class="text-xs fw-600 text-muted mb-2">MANUAL RECONCILIATION</div>
  <div class="recon-row">
    <div><div class="recon-label">HRIS (Workday)</div><div class="recon-val val-keep">${hrisVal}</div></div>
    <div><div class="recon-label">Payroll (ADP)</div><div class="recon-val val-conflict">${payVal}</div></div>
    <div><select id="recon-choice" class="form-control" style="width:auto;font-size:12px">
      <option value="hris">Keep HRIS (${hrisVal})</option>
      <option value="payroll">Keep Payroll (${payVal})</option>
      <option value="custom">Enter custom value</option>
    </select></div>
  </div>
  <div id="recon-custom" style="display:none" class="mt-2"><input type="number" class="form-control" id="recon-custom-val" placeholder="Enter correct salary"></div>
  <button class="btn btn-primary btn-sm mt-2" onclick="applyRecon('${emp.id}')">Apply Resolution</button></div>`;
}

function applyRecon(empId) {
  const choice=document.getElementById('recon-choice')?.value;
  if(!choice)return;
  const emp=STATE.employees.find(e=>e.id===empId);
  if(!emp)return;
  let val;
  if(choice==='hris')val=emp.systems.hris.salary;
  else if(choice==='payroll')val=emp.systems.payroll?.salary||emp.systems.hris.salary;
  else{val=+document.getElementById('recon-custom-val')?.value;if(!val){alert('Enter a valid salary.');return;}}
  emp.salary=val;emp.systems.hris.salary=val;if(emp.systems.payroll)emp.systems.payroll.salary=val;
  addAudit('Sarah Reynolds','Salary Reconciled',empId,`Salary set to ${fmtCur(val)} via manual reconciliation.`);
  const intg=STATE.integrations.find(i=>i.errors_list.some(e=>e.employees.includes(empId)));
  if(intg){intg.errors_list=intg.errors_list.filter(e=>!e.employees.includes(empId)||e.field!=='Salary');intg.errors=intg.errors_list.length;intg.impacted=Math.max(0,intg.impacted-1);}
  if(STATE.settings.persistence)saveToStorage();
  showToast('Reconciliation applied and audit log updated.','success');
  renderIntegrations(document.getElementById('main'));
}

function createReconTask(intId,errId) {
  const intg=STATE.integrations.find(i=>i.id===intId);
  const err=intg?.errors_list.find(e=>e.id===errId);
  if(!err)return;
  const task={id:'T'+Date.now(),title:'Reconcile: '+err.type+' — '+err.field,case:'Integration',owner:'Sarah Reynolds',due:'2024-03-07',done:false,severity:'High'};
  STATE.tasks.push(task);
  addAudit('Sarah Reynolds','Reconciliation Task Created',errId,task.title);
  if(STATE.settings.persistence)saveToStorage();
  showToast('Task created and added to your queue.','success');
}

function runBuilder() {

  const out=document.getElementById('report-output');
  out.innerHTML=`<div class="card"><div class="card-header"><span class="card-title">Custom Report — ${esc(src)}</span><button class="btn btn-secondary btn-sm" onclick="exportCSV(window._builderData,window._builderCols,'custom-report')">Export CSV</button></div>

  } else if(type==='reconcile') {
    const empId=args[0], field=args[1];

function applyTemplate(tpl) {

function sendAI(text) {
  document.getElementById('ai-input').value=text;

}

async function callBoomiStatusAPI(userInput) {
  const creds = btoa(BOOMI_API_USER + ':' + BOOMI_API_SECRET);
  try {
    const resp = await fetch(BOOMI_STATUS_URL, {
      method: 'POST',
      headers: { 'Authorization': 'Basic ' + creds, 'Accept': 'application/json', 'Content-Type': 'application/json' },
      body: JSON.stringify({ question: userInput })
    });
    if (!resp.ok) return { ok: false, status: resp.status };
    const data = await resp.json();
    return { ok: true, data };
  } catch (e) {
    return { ok: false, error: e.message };
  }
}

async function submitAI() {
  const input=document.getElementById('ai-input');
  const text=input.value.trim();
  if(!text)return;
  input.value='';
  const sendBtn=document.getElementById('ai-send');
  sendBtn.disabled=true;
  STATE.aiHistory.push({role:'user',content:text});
  STATE.aiHistory.push({role:'assistant',content:'',typing:true});
  renderAIMessages();
  const useCtx=document.getElementById('ai-context-toggle')?.checked;
  const [apiResult]=await Promise.all([
    callBoomiStatusAPI(text),
    new Promise(r=>setTimeout(r,500))
  ]);
  STATE.aiHistory=STATE.aiHistory.filter(m=>!m.typing);
  let response;
  if(apiResult&&apiResult.ok&&apiResult.data!==undefined){
    const d=apiResult.data;
    response=typeof d==='string'?d:(typeof d?.data==='string'?d.data:(d?.data?.answer!==undefined?d.data.answer:(d.answer!==undefined?d.answer:JSON.stringify(d,null,2))));
  } else {
    response=generateAIResponse(text,useCtx,apiResult);
  }
  STATE.aiHistory.push({role:'assistant',content:response,apiResult});
  renderAIMessages();
  scrollAI();
  sendBtn.disabled=false;
  if(STATE.settings.persistence)saveToStorage();
}

function generateAIResponse(text, useCtx, apiResult) {
  const t=text.toLowerCase();
  // Route-specific context
  const ctx=useCtx?buildContext():'';
  // Priority/summarize
  if(t.includes('priorit')||t.includes('immediate')||t.includes('urgent')) {
    const crit=STATE.cases.filter(c=>c.severity==='Critical'&&c.status!=='Closed');
    const overdTasks=STATE.tasks.filter(t=>!t.done&&isOverdue(t.due));
    return`**Immediate Priorities:**\n\n${crit.length?`🔴 **Critical Cases (${crit.length}):**\n${crit.map(c=>`• ${c.id}: ${c.title}`).join('\n')}\n\n`:''}${overdTasks.length?`⚠️ **Overdue Tasks (${overdTasks.length}):**\n${overdTasks.slice(0,5).map(t=>`• ${t.title} (due ${fmtDate(t.due)})`).join('\n')}\n\n`:''}**Top action:** ${crit[0]?crit[0].title+' — requires immediate resolution.':'Review overdue compliance items.'}`;
  }
  // Summarize
  if(t.includes('summar')) {
    if(selectedEmployee&&useCtx){const e=selectedEmployee;return`**Profile Summary — ${e.name}:**\n\n• **Role:** ${e.title}, ${e.dept}\n• **Risk Level:** ${e.riskLevel}\n• **Engagement:** ${e.systems.engagement.score}/100${e.systems.engagement.score<50?' ⚠️ Flight risk':''}\n• **Performance:** ${e.systems.performance.rating}/5.0\n• **Compliance Issues:** ${STATE.compliance.filter(c=>c.employee===e.id&&c.status!=='Completed').length}\n• **Open Cases:** ${STATE.cases.filter(c=>c.employee===e.id&&c.status!=='Closed').length}\n\n${e.riskLevel==='High'?'**Recommendation:** Schedule retention conversation and review compensation alignment.':'No immediate retention concerns.'}`;
    }
    if(selectedCase&&useCtx){const c=selectedCase;return`**Case Summary — ${c.id}:**\n\n• **Title:** ${c.title}\n• **Status:** ${c.status} | **Severity:** ${c.severity}\n• **Employee:** ${empName(c.employee)}\n• **Owner:** ${c.owner}\n• **SLA:** ${fmtDate(c.sla)}${isOverdue(c.sla)?' ⚠️ OVERDUE':''}\n• **Open Tasks:** ${c.tasks.filter(t=>!t.done).length}\n\n**Notes:** ${c.notes||'None'}`;}
    const openCases=STATE.cases.filter(c=>c.status!=='Closed').length;
    return`**Dashboard Summary:**\n\n• ${openCases} open cases (${STATE.cases.filter(c=>c.severity==='Critical'&&c.status!=='Closed').length} critical)\n• ${STATE.compliance.filter(c=>c.status==='Overdue'||c.status==='Missing').length} compliance alerts\n• ${STATE.integrations.reduce((a,i)=>a+i.errors,0)} integration sync errors\n• ${STATE.employees.filter(e=>e.riskLevel==='High'&&e.status!=='Terminated').length} high retention risk employees\n\nEstimated ${Math.round(STATE.settings.baselineHours*0.4)} hours/week being saved through consolidated visibility.`;
  }
  // Draft email
  if(t.includes('draft')||t.includes('email')||t.includes('message')||t.includes('letter')) {
    const emp=selectedEmployee;
    if(emp&&useCtx) {
      const draft=`Subject: Action Required — ${emp.name} Compliance/HR Follow-up\n\nHi ${emp.manager},\n\nI'm reaching out regarding ${emp.name} (${emp.id}). Please review the following items that require your attention:\n\n${STATE.compliance.filter(c=>c.employee===emp.id&&(c.status==='Overdue'||c.status==='Missing')).map(c=>`• ${c.title} — ${c.status} (${c.daysPast} days past due)`).join('\n')||'No compliance issues.'}\n\nPlease ensure completion by end of week. Let me know if you have questions.\n\nBest regards,\nSarah Reynolds\nHR Business Partner`;
      addAudit('AI Copilot','Draft Generated','Employee Email',`Manager email drafted for ${emp.name}`);
      return`**Draft Manager Email:**\n\n\`\`\`\n${draft}\n\`\`\`\n\n*Artifact logged to audit trail.*`;
    }
    return`To draft a manager email, navigate to an employee\'s 360 view first and enable "Use context". I can then draft a personalized message based on their specific compliance and HR data.`;
  }
  // Next steps
  if(t.includes('next step')||t.includes('what should')||t.includes('recommend')) {
    if(selectedCase&&useCtx){const c=selectedCase;const pending=c.tasks.filter(t=>!t.done);return`**Next Steps for ${c.id}:**\n\n${pending.map((t,i)=>`${i+1}. ${t.title} (Owner: ${t.owner}, Due: ${fmtDate(t.due)})`).join('\n')||'All tasks complete — ready to close.'}\n\n**Recommended Action:** ${pending.length?`Follow up with ${pending[0].owner} on "${pending[0].title}"`:c.status==='Open'?'Consider closing this case if resolution is reached.':'Case is in good standing.'}`;
    }
    return`**Recommended Actions:**\n\n1. Resolve C-2024-005 (terminated employee in payroll) — CRITICAL\n2. Audit salary discrepancy for Jordan Williams — SLA March 10\n3. Send COBRA notice for Omar Hassan — 44 days remaining\n4. Escalate manager tasks overdue on C-2024-001\n5. Complete compliance follow-up for Priya Patel and Derek Thompson`;
  }
  // Reconcile/integration
  if(t.includes('reconcil')||t.includes('mismatch')||t.includes('discrepanc')) {
    const mismatches=STATE.employees.filter(e=>e.systems.hris.salary!==e.systems.payroll?.salary);
    return`**Salary Discrepancies Detected (${mismatches.length}):**\n\n${mismatches.map(e=>`• **${e.name}**: HRIS ${fmtCur(e.systems.hris.salary)} vs Payroll ${fmtCur(e.systems.payroll?.salary||0)} (Δ${fmtCur(Math.abs(e.systems.hris.salary-(e.systems.payroll?.salary||0)))})`).join('\n')}\n\n**Resolution steps:**\n1. Cross-reference latest merit increase letters\n2. Identify which system is the canonical source\n3. Submit payroll correction if overpayment occurred\n4. Use the Reconcile button in the Employee 360 Employment tab`;
  }
  // Trends/explain
  if(t.includes('trend')||t.includes('explain')||t.includes('insight')||t.includes('analyz')) {
    return`**HR Operational Trends (Q1 2024):**\n\n📊 **Cases:** ${STATE.cases.length} total, ${STATE.cases.filter(c=>c.severity==='Critical').length} critical. ER cases trending from accommodation and misconduct types.\n\n🔗 **Integrations:** ADP Payroll has the highest error rate (4 errors). Salary and status sync are the most common failure types.\n\n👥 **Retention Risk:** ${STATE.employees.filter(e=>e.riskLevel==='High').length} employees flagged as high risk — Sales and Customer Success departments are most affected.\n\n✅ **Compliance:** ${STATE.compliance.filter(c=>c.status==='Overdue').length} overdue training items across ${[...new Set(STATE.compliance.map(c=>c.dept))].length} departments. Marketing and Sales have the highest exposure.`;
  }
  // Compliance
  if(t.includes('complianc')) {
    const issues=STATE.compliance.filter(c=>c.status==='Overdue'||c.status==='Missing');
    return`**Compliance Summary:**\n\n${issues.length} open items:\n${[...new Set(issues.map(c=>c.employeeName))].map(n=>{const emp=issues.filter(i=>i.employeeName===n);return`• **${n}**: ${emp.length} item${emp.length>1?'s':''} (${emp.map(i=>i.type).join(', ')})`;}).join('\n')}\n\n**Highest exposure:** ${issues.sort((a,b)=>b.daysPast-a.daysPast)[0]?.title} — ${issues[0]?.daysPast} days overdue.`;
  }
  // Time saved
  if(t.includes('time')||t.includes('sav')||t.includes('efficien')||t.includes('hour')) {
    const hr=STATE.settings.hourlyRate,bh=STATE.settings.baselineHours;
    const hSaved=Math.round(bh*0.4),wSave=Math.round(hSaved*hr),ySave=wSave*52;
    return`**Operational Efficiency Estimate:**\n\n• Baseline manual work: **${bh} hrs/week** per HR professional\n• Estimated savings from consolidated view: **${hSaved} hrs/week** (40% reduction)\n• Weekly dollar value: **${fmtCur(wSave)}** at ${fmtCur(hr)}/hr\n• **Annual savings per HR FTE: ${fmtCur(ySave)}**\n\nFor a 5-person HR team, that's approximately **${fmtCur(ySave*5)}** in recovered productivity annually. Adjust the hourly rate and baseline in Settings or the Dashboard widget.`;
  }
  // System/API status
  if(t.includes('status')||t.includes('online')||t.includes('available')||t.includes('health')||t.includes('api')) {
    if(apiResult&&apiResult.ok&&apiResult.data) {
      const d=apiResult.data;
      const comps=Object.entries(d.components||{}).map(([k,v])=>`• **${k}**: ${v}`).join('\n');
      return`**${d.service} — Live Status**\n\nService: **${d.status.toUpperCase()}** (v${d.version})\n${d.message}\n\n**Component Availability:**\n${comps}\n\n**AI Agent:** ${d.agent?.name} — ${d.agent?.status}\nCapabilities: ${d.agent?.capabilities?.join(', ')}`;
    }
    return`**System Status:**\n\nService: **ONLINE** (local data mode)\nAll 9 HR Ops Console APIs are deployed to the Boomi cloud. Live API connectivity requires APIM configuration on the Advanced atom.`;
  }
  // Generic fallback
  const fallbacks=[`I can help you with:\n\n• **Summarize** — dashboard, employee profiles, or cases\n• **Draft** — manager emails or case notes\n• **Next steps** — for cases or compliance issues\n• **Reconcile** — salary and field mismatches\n• **Explain trends** — in cases, compliance, or integration errors\n• **Time savings** — operational efficiency calculations\n• **Status** — check Boomi API connectivity\n\nTry asking: "Summarize the priority queue" or "What are next steps for the payroll exception?"`,`Based on your current data, you have ${STATE.cases.filter(c=>c.status!=='Closed').length} open cases and ${STATE.compliance.filter(c=>c.status==='Overdue').length} compliance alerts. What would you like to focus on?`];
  return fallbacks[Math.floor(Math.random()*fallbacks.length)];
}

function buildContext() {
  if(selectedEmployee) return`[Context: Employee ${selectedEmployee.name}, ${selectedEmployee.dept}, Risk: ${selectedEmployee.riskLevel}]`;
  if(selectedCase) return`[Context: Case ${selectedCase.id} — ${selectedCase.title}, Status: ${selectedCase.status}]`;
  if(currentRoute==='/integrations'&&selectedIntegration) return`[Context: Integration ${STATE.integrations.find(i=>i.id===selectedIntegration)?.name}]`;
  return`[Context: Route ${currentRoute}]`;
}

function renderAIMessages() {
  const el=document.getElementById('ai-messages');
  el.innerHTML=STATE.aiHistory.map(m=>{
    if(m.typing) return`<div class="ai-msg assistant"><div class="ai-typing"><span></span><span></span><span></span></div></div>`;
    let badge='';
    if(m.role==='assistant'&&m.apiResult!==undefined) {
      badge=m.apiResult.ok
        ?`<div class="ai-api-badge ok">✓ Boomi AI Connected</div>`
        :`<div class="ai-api-badge err">◌ Boomi AI Offline</div>`;
    }
    return`<div class="ai-msg ${m.role}">${formatAIMsg(m.content)}${badge}</div>`;
  }).join('');
  scrollAI();
}

function formatAIMsg(text) {
  return esc(text)
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/```([\s\S]*?)```/g,'<pre style="background:#f1f5f9;padding:8px;border-radius:4px;font-size:11px;overflow-x:auto;margin-top:4px;white-space:pre-wrap">$1</pre>')
    .replace(/\n/g,'<br>');
}

function scrollAI(){const el=document.getElementById('ai-messages');if(el)el.scrollTop=el.scrollHeight;}

// ===================== SEARCH =====================
function initSearch() {
  const inp=document.getElementById('global-search');
  const res=document.getElementById('search-results');
  inp.addEventListener('input',function(){
    const v=this.value.trim().toLowerCase();
    if(v.length<2){res.classList.remove('show');return;}
    const matches=STATE.employees.filter(e=>e.name.toLowerCase().includes(v)||e.id.toLowerCase().includes(v)||e.email.toLowerCase().includes(v)).slice(0,6);
    if(!matches.length){res.classList.remove('show');return;}
    res.innerHTML=matches.map(e=>`<div class="search-item" onclick="openEmployee('${e.id}');document.getElementById('global-search').value='';document.getElementById('search-results').classList.remove('show')">
      <div class="flex items-center gap-2"><div class="avatar" style="background:${deptColor(e.dept)};width:24px;height:24px;font-size:10px">${e.name.split(' ').map(n=>n[0]).join('')}</div>
      <div><div class="emp-name">${esc(e.name)}</div><div class="emp-meta">${esc(e.id)} · ${esc(e.dept)} · ${esc(e.email)}</div></div></div>
    </div>`).join('');
    res.classList.add('show');
  });
  document.addEventListener('click',e=>{if(!inp.contains(e.target)&&!res.contains(e.target))res.classList.remove('show');});
}

// ===================== UTILITIES =====================
function exportCSV(data,cols,filename) {
  const rows=[cols.join(','),...data.map(r=>cols.map(c=>{const v=r[c]!==undefined?r[c]:'';return'"'+String(v).replace(/"/g,'""')+'"';}).join(','))];
  const blob=new Blob([rows.join('\n')],{type:'text/csv'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=(filename||'export')+'.csv';a.click();URL.revokeObjectURL(url);
}

function showToast(msg,type='info') {
  const t=document.createElement('div');
  t.style.cssText=`position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:${type==='success'?'var(--success)':type==='warning'?'var(--warning)':'var(--primary)'};color:#fff;padding:10px 20px;border-radius:var(--radius);box-shadow:var(--shadow-lg);z-index:2000;font-size:13px;font-weight:500;max-width:400px;text-align:center`;
  t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),3500);
}

// ===================== INIT =====================
function init() {
  if(STATE.settings.persistence) loadFromStorage();
  // Nav click handlers
  document.querySelectorAll('.nav-item[data-route]').forEach(el=>{
    el.addEventListener('click',()=>{
      selectedEmployee=null;selectedCase=null;selectedIntegration=null;selectedError=null;
      navigate(el.dataset.route);
    });
  });
  // Notifications
  const notifBtn=document.getElementById('notif-btn');
  const notifDD=document.getElementById('notif-dropdown');
  notifBtn.addEventListener('click',e=>{e.stopPropagation();renderNotifications();notifDD.classList.toggle('show');});
  document.addEventListener('click',()=>notifDD.classList.remove('show'));
  // Create button
  document.getElementById('create-btn').addEventListener('click',()=>showModal('new-case'));
  // AI panel
  document.getElementById('ai-clear').addEventListener('click',()=>{STATE.aiHistory=[{role:'assistant',content:'Chat cleared. How can I help you?'}];renderAIMessages();});
  const aiInput=document.getElementById('ai-input');
  aiInput.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();submitAI();}});
  document.getElementById('ai-send').addEventListener('click',submitAI);
  document.getElementById('ai-context-toggle').addEventListener('change',e=>{aiUseContext=e.target.checked;});
  // AI panel toggle on mobile
  document.getElementById('ai-toggle-btn').addEventListener('click',()=>{document.getElementById('ai-panel').classList.toggle('open');});
  // Menu toggle on mobile
  const menuBtn=document.getElementById('menu-toggle');
  if(window.innerWidth<=820){menuBtn.style.display='flex';}
  menuBtn.addEventListener('click',()=>document.getElementById('sidebar').classList.toggle('open'));
  window.addEventListener('resize',()=>{menuBtn.style.display=window.innerWidth<=820?'flex':'none';});
  // Hash routing
  const hash=window.location.hash.replace('#','');
  if(hash && hash.startsWith('/')) {
    currentRoute=hash;
    // restore nav active state
    document.querySelectorAll('.nav-item[data-route]').forEach(el=>{
      el.classList.toggle('active',hash.startsWith(el.dataset.route)&&(hash===el.dataset.route||hash.startsWith(el.dataset.route+'/')));
    });
  } else {
    currentRoute='/dashboard';
    document.querySelector('.nav-item[data-route="/dashboard"]').classList.add('active');
  }
  // Init search
  initSearch();
  // Render initial view
  renderMain();
  // Render AI messages
  renderAIMessages();
  updateAISuggestions();
  updateBadges();
}

document.addEventListener('DOMContentLoaded', init);
</script>
