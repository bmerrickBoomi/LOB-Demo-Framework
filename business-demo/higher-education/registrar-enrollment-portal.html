<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registrar Enrollment Portal</title>
<style>
:root {
  --primary: #003C57; --primary-dark: #002A3D; --primary-light: #e0f0f7;
  --success: #16a34a; --success-light: #dcfce7;
  --warning: #d97706; --warning-light: #fef3c7;
  --danger: #dc2626; --danger-light: #fee2e2;
  --teal: #0d9488; --teal-light: #ccfbf1;
  --bg: #f1f5f9; --surface: #ffffff; --surface2: #f8fafc;
  --border: #e2e8f0; --border2: #cbd5e1;
  --text: #0f172a; --text2: #475569; --text3: #94a3b8;
  --sidebar-w: 220px; --header-h: 56px; --ai-w: 320px;
  --radius: 8px; --radius-sm: 4px;
  --shadow: 0 1px 3px rgba(0,0,0,.1), 0 1px 2px rgba(0,0,0,.06);
  --shadow-md: 0 4px 6px rgba(0,0,0,.07), 0 2px 4px rgba(0,0,0,.06);
  --shadow-lg: 0 10px 15px rgba(0,0,0,.1), 0 4px 6px rgba(0,0,0,.05);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Inter',system-ui,-apple-system,sans-serif;font-size:14px;color:var(--text);background:var(--bg)}
a{color:inherit;text-decoration:none}
button{cursor:pointer;font-family:inherit;font-size:inherit}
input,textarea,select{font-family:inherit;font-size:inherit}
#app{display:grid;grid-template-columns:var(--sidebar-w) 1fr var(--ai-w);grid-template-rows:var(--header-h) 1fr;height:100vh;overflow:hidden}
#header{grid-column:1/-1;grid-row:1;background:var(--primary);border-bottom:1px solid var(--primary-dark);display:flex;align-items:center;padding:0 16px;gap:12px;z-index:100;box-shadow:var(--shadow)}
#sidebar{grid-column:1;grid-row:2;background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;display:flex;flex-direction:column}
#main{grid-column:2;grid-row:2;overflow-y:auto;padding:24px}
#ai-panel{grid-column:3;grid-row:2;background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
/* Header */
.header-logo{font-size:16px;font-weight:700;color:#fff;white-space:nowrap;margin-right:8px}
.header-logo span{color:rgba(255,255,255,.6);font-weight:400;font-size:12px;margin-left:4px}
.header-term{background:rgba(255,255,255,.15);color:#fff;border-radius:var(--radius-sm);padding:4px 10px;font-size:12px;font-weight:600;white-space:nowrap}
.search-wrap{flex:1;max-width:360px;position:relative}
.search-wrap input{width:100%;padding:7px 12px 7px 36px;border:1px solid rgba(255,255,255,.3);border-radius:var(--radius);background:rgba(255,255,255,.15);color:#fff;outline:none;transition:.2s}
.search-wrap input::placeholder{color:rgba(255,255,255,.6)}
.search-wrap input:focus{border-color:rgba(255,255,255,.6);background:rgba(255,255,255,.2)}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,.7);pointer-events:none}
.search-results{position:absolute;top:calc(100% + 4px);left:0;right:0;background:#fff;border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow-lg);z-index:200;max-height:280px;overflow-y:auto;display:none}
.search-results.show{display:block}
.search-item{padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--border);transition:.15s}
.search-item:hover{background:var(--surface2)}
.search-item:last-child{border-bottom:none}
.search-item .s-name{font-weight:600;font-size:13px;color:var(--text)}
.search-item .s-meta{font-size:11px;color:var(--text3);margin-top:1px}
.header-actions{display:flex;align-items:center;gap:8px;margin-left:auto}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--radius);border:none;font-weight:500;transition:.2s;line-height:1}
.btn-primary{background:var(--primary);color:#fff}.btn-primary:hover{background:var(--primary-dark)}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border)}.btn-secondary:hover{background:var(--border)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-danger{background:var(--danger);color:#fff}.btn-danger:hover{opacity:.9}
.btn-success{background:var(--success);color:#fff}.btn-success:hover{opacity:.9}
.btn-white{background:#fff;color:var(--primary);border:1px solid rgba(255,255,255,.3)}.btn-white:hover{background:var(--primary-light)}
.icon-btn{background:rgba(255,255,255,.1);border:none;padding:6px;border-radius:var(--radius-sm);color:#fff;position:relative;display:flex;align-items:center;justify-content:center}.icon-btn:hover{background:rgba(255,255,255,.2)}
.icon-btn-dark{background:none;border:none;padding:6px;border-radius:var(--radius-sm);color:var(--text2);position:relative;display:flex;align-items:center;justify-content:center}.icon-btn-dark:hover{background:var(--surface2)}
.notif-badge{position:absolute;top:2px;right:2px;background:var(--danger);color:#fff;border-radius:50%;width:14px;height:14px;font-size:9px;display:flex;align-items:center;justify-content:center;font-weight:700}
.notif-dropdown{position:absolute;top:calc(100% + 8px);right:0;width:320px;background:#fff;border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow-lg);z-index:200;display:none}
.notif-dropdown.show{display:block}
.notif-header{padding:12px 16px;border-bottom:1px solid var(--border);font-weight:600;font-size:13px;display:flex;justify-content:space-between;align-items:center}
.notif-item{padding:10px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:.15s}
.notif-item:hover{background:var(--surface2)}
.notif-item:last-child{border-bottom:none}
.notif-title{font-weight:500;font-size:12px;margin-bottom:2px}
.notif-time{font-size:11px;color:var(--text3)}
/* Sidebar */
.nav-section{padding:8px 0}
.nav-label{padding:6px 16px 4px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text3)}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 16px;color:var(--text2);cursor:pointer;transition:.15s;font-size:13px;font-weight:500}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:var(--primary-light);color:var(--primary);font-weight:600}
.nav-item svg{flex-shrink:0;opacity:.7}
.nav-item.active svg{opacity:1}
.nav-badge{margin-left:auto;background:var(--danger);color:#fff;border-radius:10px;padding:1px 6px;font-size:10px;font-weight:700}
.nav-footer{margin-top:auto;padding:12px;border-top:1px solid var(--border)}
.user-chip{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--radius);background:var(--surface2)}
.avatar{width:30px;height:30px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;flex-shrink:0}
.avatar-lg{width:48px;height:48px;font-size:18px}
.user-info{flex:1;min-width:0}
.user-name{font-weight:600;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.user-role{font-size:10px;color:var(--text3)}
/* Cards & KPIs */
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.page-title{font-size:20px;font-weight:700}
.page-subtitle{font-size:12px;color:var(--text3);margin-top:2px}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px;margin-bottom:20px}
.kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow)}
.kpi-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:8px}
.kpi-value{font-size:28px;font-weight:800;line-height:1}
.kpi-sub{font-size:11px;color:var(--text3);margin-top:4px}
.kpi-danger .kpi-value{color:var(--danger)}
.kpi-warning .kpi-value{color:var(--warning)}
.kpi-success .kpi-value{color:var(--success)}
.kpi-primary .kpi-value{color:var(--primary)}
.kpi-teal .kpi-value{color:var(--teal)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow)}
.card-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:14px;font-weight:600}
.card-body{padding:16px}
/* Badges */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;white-space:nowrap}
.badge-danger{background:var(--danger-light);color:var(--danger)}
.badge-warning{background:var(--warning-light);color:var(--warning)}
.badge-success{background:var(--success-light);color:var(--success)}
.badge-primary{background:var(--primary-light);color:var(--primary)}
.badge-neutral{background:var(--surface2);color:var(--text2);border:1px solid var(--border)}
.badge-teal{background:var(--teal-light);color:var(--teal)}
.sev{display:inline-block;width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sev-critical{background:var(--danger)}.sev-high{background:var(--warning)}.sev-medium{background:#3b82f6}.sev-low{background:var(--text3)}
/* Tables */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{padding:10px 12px;text-align:left;font-weight:600;color:var(--text2);border-bottom:2px solid var(--border);background:var(--surface2);white-space:nowrap}
td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:hover td{background:var(--surface2)}
tr:last-child td{border-bottom:none}
.link{color:var(--primary);cursor:pointer;font-weight:500}.link:hover{text-decoration:underline}
/* Filters */
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;align-items:center}
.filter-bar select,.filter-bar input{padding:6px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);background:#fff;color:var(--text);outline:none;font-size:12px}
.filter-bar select:focus,.filter-bar input:focus{border-color:var(--primary)}
/* Student 360 */
.student-header{display:flex;align-items:flex-start;gap:16px;padding:20px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:16px}
.student-meta-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-top:12px}
.meta-item .label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:2px}
.meta-item .value{font-size:13px;font-weight:500}
.tabs{display:flex;gap:0;border-bottom:2px solid var(--border);margin-bottom:16px;overflow-x:auto}
.tab{padding:9px 16px;cursor:pointer;color:var(--text2);font-weight:500;font-size:13px;border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap;transition:.15s}
.tab:hover{color:var(--text)}
.tab.active{color:var(--primary);border-bottom-color:var(--primary);font-weight:600}
/* Timeline */
.timeline{display:flex;flex-direction:column;gap:0}
.timeline-item{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.timeline-item:last-child{border-bottom:none}
.timeline-dot{width:10px;height:10px;border-radius:50%;background:var(--primary);flex-shrink:0;margin-top:4px}
.timeline-dot.system{background:var(--text3)}.timeline-dot.alert{background:var(--danger)}
/* Progress */
.progress-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;background:var(--primary);transition:.3s}
/* Integration */
.int-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px}
.int-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;cursor:pointer;transition:.2s;box-shadow:var(--shadow)}
.int-card:hover{box-shadow:var(--shadow-md);border-color:var(--border2)}
.int-card.selected{border-color:var(--primary);box-shadow:0 0 0 2px var(--primary-light)}
.int-status{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600}
.status-dot{width:8px;height:8px;border-radius:50%}
.status-ok{background:var(--success)}.status-warn{background:var(--warning)}.status-error{background:var(--danger)}
/* Priority Queue */
.pq-item{display:flex;align-items:flex-start;gap:10px;padding:12px 0;border-bottom:1px solid var(--border);cursor:pointer}
.pq-item:last-child{border-bottom:none}
.pq-item:hover{background:var(--surface2);margin:0 -16px;padding:12px 16px}
.pq-content{flex:1;min-width:0}
.pq-title{font-weight:500;font-size:13px;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pq-meta{font-size:11px;color:var(--text3)}
.pq-due{font-size:11px;color:var(--danger);font-weight:600}
/* Modals */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow-lg);max-width:560px;width:100%;max-height:90vh;overflow-y:auto;animation:modalIn .18s ease}
@keyframes modalIn{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
.modal-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:16px;font-weight:700}
.modal-body{padding:20px}
.modal-footer{padding:14px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:5px}
.form-control{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);outline:none;transition:.2s;background:#fff}
.form-control:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-light)}
select.form-control{cursor:pointer}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
/* AI Panel */
.ai-header{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.ai-title{font-size:13px;font-weight:700;display:flex;align-items:center;gap:6px}
.ai-dot{width:7px;height:7px;border-radius:50%;background:var(--success);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes ai-bounce{0%,80%,100%{transform:scale(0)}40%{transform:scale(1)}}
.ai-typing{display:flex;gap:4px;align-items:center;padding:2px 0}
.ai-typing span{width:6px;height:6px;border-radius:50%;background:var(--text3);display:inline-block;animation:ai-bounce 1.2s infinite ease-in-out}
.ai-typing span:nth-child(1){animation-delay:-0.24s}.ai-typing span:nth-child(2){animation-delay:-0.12s}.ai-typing span:nth-child(3){animation-delay:0s}
.ai-messages{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px}
.ai-msg{max-width:90%;padding:9px 12px;border-radius:var(--radius);font-size:12px;line-height:1.5}
.ai-msg.user{background:var(--primary);color:#fff;align-self:flex-end;border-bottom-right-radius:2px}
.ai-msg.assistant{background:var(--surface2);color:var(--text);align-self:flex-start;border-bottom-left-radius:2px;border:1px solid var(--border)}
.ai-msg.system{background:var(--warning-light);color:var(--warning);align-self:center;font-size:11px;text-align:center;font-style:italic;border-radius:10px}
.ai-api-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;padding:2px 7px;border-radius:10px;margin-top:6px;font-weight:600;letter-spacing:.02em}
.ai-api-badge.ok{background:var(--success-light);color:var(--success)}.ai-api-badge.err{background:#f1f5f9;color:var(--text3);border:1px solid var(--border)}
.ai-suggestions{padding:8px 12px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:5px;flex-shrink:0}
.ai-sugg-label{font-size:10px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px}
.ai-sugg-btn{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:6px 10px;text-align:left;font-size:11px;color:var(--text2);cursor:pointer;transition:.15s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ai-sugg-btn:hover{background:var(--primary-light);border-color:var(--primary);color:var(--primary)}
.ai-composer{padding:10px 12px;border-top:1px solid var(--border);flex-shrink:0}
.ai-composer textarea{width:100%;resize:none;border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 10px;font-size:12px;line-height:1.4;outline:none;min-height:64px;max-height:120px;background:var(--surface2)}
.ai-composer textarea:focus{border-color:var(--primary);background:#fff}
.ai-composer-actions{display:flex;align-items:center;justify-content:flex-end;margin-top:6px}
/* Misc */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.flex{display:flex}.items-center{align-items:center}.justify-between{justify-content:space-between}.gap-2{gap:8px}.gap-3{gap:12px}
.mt-2{margin-top:8px}.mt-3{margin-top:12px}.mt-4{margin-top:16px}
.mb-2{margin-bottom:8px}.mb-3{margin-bottom:12px}.mb-4{margin-bottom:16px}
.p-3{padding:12px}.p-4{padding:16px}
.text-sm{font-size:12px}.text-xs{font-size:11px}
.fw-600{font-weight:600}.fw-700{font-weight:700}
.text-muted{color:var(--text3)}.text-danger{color:var(--danger)}.text-success{color:var(--success)}.text-warning{color:var(--warning)}.text-primary{color:var(--primary)}
.rounded{border-radius:var(--radius)}.border{border:1px solid var(--border)}
.w-full{width:100%}
.divider{height:1px;background:var(--border);margin:12px 0}
.hold-tag{display:inline-flex;align-items:center;padding:2px 7px;border-radius:4px;font-size:11px;background:var(--danger-light);border:1px solid var(--danger);color:var(--danger);margin:1px;font-weight:600}
.course-cap{display:flex;align-items:center;gap:6px;font-size:12px}
.cap-bar{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.cap-fill{height:100%;border-radius:3px;transition:.3s}
.deadline-item{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}
.deadline-item:last-child{border-bottom:none}
.error-panel{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-top:12px}
@media(max-width:1100px){:root{--ai-w:260px;--sidebar-w:190px}}
</style>
</head>
<body>
<div id="app">
<!-- Header -->
<header id="header">
  <div class="header-logo">Registrar <span>Enrollment Portal</span></div>
  <div class="header-term">Spring 2025</div>
  <div class="search-wrap">
    <span class="search-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></span>
    <input type="text" id="global-search" placeholder="Search students, IDs, courses…" autocomplete="off">
    <div class="search-results" id="search-results"></div>
  </div>
  <div class="header-actions">
    <button class="btn btn-white btn-sm" onclick="showModal('add-enrollment')">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Add / Drop
    </button>
    <div style="position:relative">
      <button class="icon-btn" id="notif-btn" title="Notifications">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        <span class="notif-badge" id="notif-count">5</span>
      </button>
      <div class="notif-dropdown" id="notif-dropdown"></div>
    </div>
    <button class="icon-btn" id="ai-toggle-btn" title="Toggle AI Advisor">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a10 10 0 0 1 10 10c0 5.52-4.48 10-10 10S2 17.52 2 12 6.48 2 12 2z"/><path d="M8 9h8M8 12h5M8 15h4"/></svg>
    </button>
  </div>
</header>
<!-- Sidebar -->
<nav id="sidebar">
  <div class="nav-section">
    <div class="nav-label">Navigation</div>
    <div class="nav-item" data-route="/dashboard">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>Dashboard</div>

// ===================== HELPERS =====================
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtDate(d){ if(!d)return'—'; const dt=new Date(d+'T12:00:00'); return dt.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); }
function statusBadge(s){
  const map={
    'Good Standing':'badge-success','Academic Probation':'badge-danger',
    'Approved':'badge-success','Blocked':'badge-danger','Pending Review':'badge-warning',
    'Waitlisted':'badge-primary','healthy':'badge-success','warning':'badge-warning','error':'badge-danger',
  };
  return `<span class="badge ${map[s]||'badge-neutral'}">${esc(s)}</span>`;
}
function holdBadge(h){ return `<span class="hold-tag">${esc(h)}</span>`; }
function gpaColor(g){ return g>=3.5?'var(--success)':g>=2.5?'var(--warning)':'var(--danger)'; }

  currentRoute = route;
  selectedStudent = null;
  selectedStudentTab = 'overview';
  document.querySelectorAll('.nav-item').forEach(el=>{
    el.classList.toggle('active', el.dataset.route === route);
  });
  const main = document.getElementById('main');
  main._stuSearch=''; main._stuProgram=''; main._stuStatus=''; main._stuHold='';
  render();
  updateAISuggestions();
}
function render(){
  const el = document.getElementById('main');
  if(currentRoute==='/dashboard') renderDashboard(el);
  else if(currentRoute==='/students') renderStudents(el);
  else if(currentRoute==='/enrollment') renderEnrollment(el);
  else if(currentRoute==='/courses') renderCourses(el);
  else if(currentRoute==='/deadlines') renderDeadlines(el);
  else if(currentRoute==='/systems') renderSystems(el);
  else if(currentRoute==='/reports') renderReports(el);
}

    </div></div>
  </div>
</div>`;
}

function buildPriorityQueue(){
  const q=[];
  STATE.deadlines.filter(d=>d.status==='Overdue').forEach(d=>{
    q.push({title:d.title,cat:'Deadline · '+d.category,sev:d.daysPast>30?'Critical':'High',due:'Past due '+d.daysPast+'d',action:`navigate('/deadlines')`});
  });
  STATE.systems.filter(s=>s.errors>0).forEach(s=>{
    s.errors_list.filter(e=>e.severity==='critical').forEach(e=>{
      q.push({title:s.name+': '+e.msg.substring(0,55)+'…',cat:'System Error',sev:'Critical',due:'',action:`navigate('/systems')`});
    });
  });
  STATE.enrollmentRequests.filter(r=>r.status==='Blocked').forEach(r=>{
    q.push({title:r.studentName+' — '+r.courseName+' blocked',cat:'Enrollment · '+r.type,sev:'High',due:'',action:`navigate('/enrollment')`});
  });
  STATE.students.filter(s=>s.status==='Academic Probation').forEach(s=>{
    q.push({title:s.name+' — Academic Probation (GPA '+s.gpa+')',cat:'Student · '+s.program,sev:'High',due:'',action:`openStudent('${s.id}')`});
  });
  return q.slice(0,8);
}

// ===================== STUDENTS =====================
function renderStudents(el){
  if(selectedStudent){ renderStudent360(el); return; }
  const search = el._stuSearch||'';
  const progFilter = el._stuProgram||'';
  const statFilter = el._stuStatus||'';
  const holdFilter = el._stuHold||'';
  const programs=[...new Set(STATE.students.map(s=>s.program))].sort();

  let students = STATE.students.filter(s=>{
    if(search && !s.name.toLowerCase().includes(search.toLowerCase()) && !s.id.toLowerCase().includes(search.toLowerCase()) && !s.email.toLowerCase().includes(search.toLowerCase())) return false;
    if(progFilter && s.program!==progFilter) return false;
    if(statFilter && s.status!==statFilter) return false;
    if(holdFilter==='has-holds' && s.holds.length===0) return false;
    if(holdFilter==='no-holds' && s.holds.length>0) return false;
    return true;
  });

  el.innerHTML = `
<div class="page-header"><div><div class="page-title">Student Directory</div><div class="page-subtitle">${STATE.students.length} enrolled — Spring 2025</div></div></div>
<div class="filter-bar">
  <input type="text" placeholder="Search name, ID, email…" value="${esc(search)}" id="stu-search" oninput="stuFilter(this.value,'search')">
  <select onchange="stuFilter(this.value,'program')" id="stu-prog-sel"><option value="">All Programs</option>${programs.map(p=>`<option value="${esc(p)}" ${progFilter===p?'selected':''}>${esc(p)}</option>`).join('')}</select>
  <select onchange="stuFilter(this.value,'status')" id="stu-stat-sel"><option value="">All Statuses</option>${['Good Standing','Academic Probation'].map(s=>`<option value="${esc(s)}" ${statFilter===s?'selected':''}>${esc(s)}</option>`).join('')}</select>
  <select onchange="stuFilter(this.value,'hold')" id="stu-hold-sel"><option value="">All Holds</option><option value="has-holds" ${holdFilter==='has-holds'?'selected':''}>Has Holds</option><option value="no-holds" ${holdFilter==='no-holds'?'selected':''}>No Holds</option></select>
  <span class="text-xs text-muted">${students.length} results</span>
</div>
<div class="card"><div class="table-wrap"><table>
<thead><tr><th>Student</th><th>Program</th><th>Level</th><th>GPA</th><th>Credits</th><th>Status</th><th>Holds</th><th>Actions</th></tr></thead>
<tbody>${students.map(s=>`<tr>
  <td><div class="flex items-center gap-2"><div class="avatar" style="background:var(--primary);width:28px;height:28px;font-size:11px">${s.name.split(' ').map(n=>n[0]).join('')}</div><div><div class="fw-600 link" onclick="openStudent('${s.id}')">${esc(s.name)}</div><div class="text-xs text-muted">${esc(s.id)} · ${esc(s.email)}</div></div></div></td>
  <td class="text-sm">${esc(s.program)}</td>
  <td class="text-sm">${esc(s.level)}</td>
  <td><span style="font-weight:700;color:${gpaColor(s.gpa)}">${s.gpa.toFixed(1)}</span></td>
  <td class="text-sm">${s.credits.completed} / ${s.credits.required}</td>
  <td>${statusBadge(s.status)}</td>
  <td>${s.holds.length?s.holds.map(holdBadge).join(''):'<span class="badge badge-success">None</span>'}</td>
  <td><button class="btn btn-secondary btn-sm" onclick="openStudent('${s.id}')">View 360</button></td>
</tr>`).join('')}
</tbody></table></div></div>`;
  el._stuSearch=search; el._stuProgram=progFilter; el._stuStatus=statFilter; el._stuHold=holdFilter;
}

function stuFilter(val,type){
  const el=document.getElementById('main');
  if(type==='search') el._stuSearch=val;
  else if(type==='program') el._stuProgram=val;
  else if(type==='status') el._stuStatus=val;
  else if(type==='hold') el._stuHold=val;
  renderStudents(el);
}

}

  renderSystems(document.getElementById('main'));

function renderSystemDetail(){
  const s=STATE.systems.find(x=>x.id===selectedSystem);
  if(!s)return'';
  if(!s.errors_list.length) return`<div class="card"><div class="card-body" style="text-align:center;padding:30px;color:var(--success)">All clear — no errors detected for ${esc(s.name)}.</div></div>`;
  return`<div class="card"><div class="card-header"><span class="card-title">${esc(s.name)} — Error Details</span><span class="badge badge-danger">${s.errors_list.length} error${s.errors_list.length>1?'s':''}</span></div>
<div class="card-body">
${s.errors_list.map(e=>`<div class="error-panel mb-3">
  <div class="flex justify-between items-center mb-2">
    <span class="fw-600">${esc(e.type)}</span>
    <span class="badge ${e.severity==='critical'?'badge-danger':e.severity==='high'?'badge-warning':'badge-primary'}">${e.severity}</span>
  </div>

const BOOMI_API_BASE='http://localhost:8077';
const BOOMI_API_USER='boomi_brianmerrick-4SYB9W.N0OO9W';
const BOOMI_API_SECRET='37b5b313-5c46-4912-bf82-6f804bd856ea';
const BOOMI_STATUS_URL=BOOMI_API_BASE+'/ws/rest/v1/HigherEd/RegistrarStatus';

async function fetchRegistrarStatus(userInput){
  const creds=btoa(BOOMI_API_USER+':'+BOOMI_API_SECRET);
  try{
    const resp=await fetch(BOOMI_STATUS_URL,{
      method:'POST',
      headers:{'Authorization':'Basic '+creds,'Accept':'application/json','Content-Type':'application/json'},
      body:JSON.stringify({question:userInput})
    });
    if(!resp.ok) return {ok:false,status:resp.status};
    const data=await resp.json();
    return {ok:true,data};
  }catch(e){
    return {ok:false,error:e.message};
  }
}

function getAIResponse(msg,status){
  const lower=msg.toLowerCase();
  for(const rule of AI_RESPONSES){
    if(rule.k.some(k=>lower.includes(k))) return rule.r();
  }
  const apiStatus=status?`\n\n[API Status: ${status.status} — ${status.message}]`:'';
  return `I can help you with enrollment management, student holds, course capacity, academic deadlines, and system integration status for Spring 2025. Try asking:\n• "Which students have holds?"\n• "What courses are full?"\n• "Show overdue deadlines"\n• "What's the FERPA status?"${apiStatus}`;
}

function formatAIMsg(text){
  return esc(text)
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/```([\s\S]*?)```/g,'<pre style="background:#f1f5f9;padding:8px;border-radius:4px;font-size:11px;overflow-x:auto;margin-top:4px;white-space:pre-wrap">$1</pre>')
    .replace(/\n/g,'<br>');
}

function scrollAI(){const el=document.getElementById('ai-messages');if(el)el.scrollTop=el.scrollHeight;}

function addAIMsg(role,text,apiResult){
  const container=document.getElementById('ai-messages');
  const div=document.createElement('div');
  div.className=`ai-msg ${role}`;
  let badge='';
  if(role==='assistant'&&apiResult!==undefined){
    badge=apiResult&&apiResult.ok
      ?`<div class="ai-api-badge ok">✓ Boomi AI Connected</div>`
      :`<div class="ai-api-badge err">◌ Boomi AI Offline</div>`;
  }
  div.innerHTML=formatAIMsg(text)+badge;
  container.appendChild(div);
  scrollAI();
}

async function sendAI(){
  const inp=document.getElementById('ai-input');
  const msg=inp.value.trim();
  if(!msg)return;
  addAIMsg('user',msg);
  inp.value='';
  const sendBtn=document.getElementById('ai-send');
  if(sendBtn)sendBtn.disabled=true;
  const thinkingEl=document.createElement('div');
  thinkingEl.className='ai-msg assistant';
  thinkingEl.innerHTML='<div class="ai-typing"><span></span><span></span><span></span></div>';
  document.getElementById('ai-messages').appendChild(thinkingEl);
  scrollAI();
  const [apiResult]=await Promise.all([
    fetchRegistrarStatus(msg),
    new Promise(r=>setTimeout(r,500))
  ]);
  thinkingEl.remove();
  let response;
  if(apiResult&&apiResult.ok&&apiResult.data!==undefined){
    const d=apiResult.data;
    response=typeof d==='string'?d:(typeof d?.data==='string'?d.data:(d?.data?.answer!==undefined?d.data.answer:(d.answer!==undefined?d.answer:JSON.stringify(d,null,2))));
  } else {
    response=getAIResponse(msg,null);
  }
  addAIMsg('assistant',response,apiResult);
  if(sendBtn)sendBtn.disabled=false;
}

  document.getElementById('ai-suggestions').innerHTML=`<div class="ai-sugg-label">Suggested</div>${suggs.map(s=>`<button class="ai-sugg-btn" onclick="aiSuggClick('${esc(s)}')">${esc(s)}</button>`).join('')}`;

function aiSuggClick(text){

}

document.getElementById('global-search').addEventListener('input',function(){
  const q=this.value.trim().toLowerCase();
  const res=document.getElementById('search-results');
  if(q.length<2){res.classList.remove('show');return;}
  const hits=STATE.students.filter(s=>s.name.toLowerCase().includes(q)||s.id.toLowerCase().includes(q)||s.email.toLowerCase().includes(q)||s.program.toLowerCase().includes(q)).slice(0,6);
  if(!hits.length){res.classList.remove('show');return;}
  res.innerHTML=hits.map(s=>`<div class="search-item" onclick="openStudentFromSearch('${s.id}')"><div class="s-name">${esc(s.name)}</div><div class="s-meta">${esc(s.id)} · ${esc(s.program)} · ${esc(s.level)}</div></div>`).join('');
  res.classList.add('show');
});
document.addEventListener('click',e=>{if(!e.target.closest('.search-wrap'))document.getElementById('search-results').classList.remove('show');});
function openStudentFromSearch(id){
  document.getElementById('search-results').classList.remove('show');
  document.getElementById('global-search').value='';
  currentRoute='/students';
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.toggle('active',el.dataset.route==='/students'));
  selectedStudent=STATE.students.find(s=>s.id===id);
  selectedStudentTab='overview';
  render();
}

function showModal(type){
  const overlay=document.createElement('div');
  overlay.className='modal-overlay';
  overlay.onclick=e=>{if(e.target===overlay)overlay.remove();};
  let html='';
  if(type==='add-enrollment'){
    html=`<div class="modal"><div class="modal-header"><span class="modal-title">Add / Drop Course</span><button class="btn btn-secondary btn-sm" onclick="this.closest('.modal-overlay').remove()">✕</button></div>
    <div class="modal-body">
      <div class="form-group"><label class="form-label">Student</label>
      <select class="form-control" id="enr-student"><option value="">Select student…</option>${STATE.students.map(s=>`<option value="${s.id}">${esc(s.name)} (${s.id})</option>`).join('')}</select></div>
      <div class="form-group"><label class="form-label">Course</label>
      <select class="form-control" id="enr-course"><option value="">Select course…</option>${STATE.courses.map(c=>`<option value="${c.id}">${esc(c.id)} — ${esc(c.name)} (${c.enrolled}/${c.capacity})</option>`).join('')}</select></div>
      <div class="form-group"><label class="form-label">Request Type</label>
      <select class="form-control" id="enr-type"><option value="Add">Add</option><option value="Drop">Drop</option><option value="Waitlist">Add to Waitlist</option></select></div>
      <div class="form-group"><label class="form-label">Notes</label><textarea class="form-control" id="enr-notes" rows="3" placeholder="Reason or override justification…"></textarea></div>
    </div>
    <div class="modal-footer"><button class="btn btn-secondary" onclick="this.closest('.modal-overlay').remove()">Cancel</button><button class="btn btn-primary" onclick="submitEnrollment()">Submit Request</button></div>
    </div>`;
  }
  overlay.innerHTML=html;
  document.getElementById('modals').appendChild(overlay);
}

function submitEnrollment(){
  const sid=document.getElementById('enr-student').value;
  const cid=document.getElementById('enr-course').value;
  const type=document.getElementById('enr-type').value;
  const notes=document.getElementById('enr-notes').value;
  if(!sid||!cid){alert('Please select a student and course.');return;}
  const student=STATE.students.find(s=>s.id===sid);
  const course=STATE.courses.find(c=>c.id===cid);
  const hasHold=student&&student.holds.length>0;
  const newReq={id:'ENR-'+String(STATE.enrollmentRequests.length+1).padStart(3,'0'),student:sid,studentName:student?.name||sid,course:cid,courseName:course?.name||cid,type,status:hasHold?'Blocked':'Pending Review',position:type==='Waitlist'?course.waitlist+1:null,submitted:new Date().toISOString().slice(0,10),notes:hasHold?'Blocked by '+student.holds.join(', '):notes};
  STATE.enrollmentRequests.push(newReq);
  if(course&&type==='Waitlist')course.waitlist++;
  document.querySelector('.modal-overlay')?.remove();
  navigate('/enrollment');
  addAIMsg('assistant',`Enrollment request submitted for ${student?.name||sid} — ${type} ${course?.name||cid}. Status: ${newReq.status}.`);
}
